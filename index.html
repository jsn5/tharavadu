<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meenmutty Mala</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        canvas { display: block; }
        #overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(10, 25, 10, 0.85);
            color: #e8f5e9; cursor: pointer; z-index: 10;
            backdrop-filter: blur(8px);
        }
        #overlay h1 { font-size: 32px; font-weight: 300; letter-spacing: 2px; margin-bottom: 8px; color: #c8e6c9; }
        #overlay h2 { font-size: 16px; font-weight: 300; color: #81c784; margin-bottom: 28px; }
        #overlay .start { font-size: 14px; color: #a5d6a7; padding: 10px 28px; border: 1px solid #4a6b4d; border-radius: 4px; }
        #hud {
            position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 25, 10, 0.5); color: rgba(165, 214, 167, 0.7);
            padding: 6px 18px; border-radius: 4px; font-size: 12px;
            pointer-events: none; display: none; backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
<div id="overlay">
    <h1>Meenmutty Mala</h1>
    <h2>Western Ghats</h2>
    <div class="start">Click to explore</div>
</div>
<div id="hud">ESC to pause &nbsp;|&nbsp; WASD move &nbsp;|&nbsp; SHIFT sprint &nbsp;|&nbsp; SPACE jump</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { Sky } from 'three/addons/objects/Sky.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

// ============================================================
// PALETTE - Kerala Western Ghats
// ============================================================
const C = {
    laterite: 0x7A3B1E, lateriteDark: 0x5C2D15, topSoil: 0x4A2E14, mud: 0x6B4226,
    grass: 0x2D7B2E, grassMid: 0x3A8D38, grassLight: 0x4EAA42, grassDry: 0x6B9B4A,
    undergrowth: 0x1E6A26, moss: 0x3B7B40, forestFloor: 0x2A4A2A,
    wallWhite: 0xF2EDE4, wallBase: 0xD0C8B8, concrete: 0xB0A898, concreteEdge: 0x908070,
    redBrick: 0xA04028, wood: 0x5A3518, woodFrame: 0x6B4423, redOxide: 0x8B3828,
    rockLight: 0x7A7568, rockMid: 0x5E5A4E, rockDark: 0x4A4640, rockWarm: 0x6B6355,
    coconutTrunk: 0x6B5D42, coconutLeaf: 0x1B6E30,
    arecanutTrunk: 0x8E8A6E, arecanutLeaf: 0x258A3E,
    mangoTrunk: 0x4E3524, mangoLeaf: 0x1A6A28, mangoDark: 0x0E4E1E,
    teakTrunk: 0x6B5040, teakLeaf: 0x2E7B32, teakLeafLight: 0x4A9A4A,
    jackfruitLeaf: 0x1E6E2A, plantainGreen: 0x3A9A3A, plantainStem: 0x6B9B5A,
    well: 0x606060, water: 0x2288BB, path: 0x9A7A60,
};

// ============================================================
// PROCEDURAL TEXTURES
// ============================================================
function makeTex(w, h, fn) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    fn(ctx, w, h);
    const t = new THREE.CanvasTexture(c);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    return t;
}

// Seeded random for texture consistency
function tRand(seed) { let s = seed; return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; }; }

const TEX = {};

// Weathered white wall — moderate tropical weathering
TEX.wall = makeTex(512, 512, (ctx, w, h) => {
    ctx.fillStyle = '#E8E0D4'; ctx.fillRect(0, 0, w, h);
    const rng = tRand(42);
    // Plaster noise
    for (let i = 0; i < 4000; i++) {
        const v = 210 + rng() * 35;
        ctx.fillStyle = `rgba(${v},${v - 4},${v - 10},0.25)`;
        ctx.fillRect(rng() * w, rng() * h, 1 + rng() * 3, 1 + rng() * 3);
    }
    // Mold/algae streaks from top
    for (let i = 0; i < 9; i++) {
        const x = rng() * w, sw = 6 + rng() * 14;
        const fade = 0.6 + rng() * 0.1;
        const g = ctx.createLinearGradient(x, 0, x, h);
        g.addColorStop(0, `rgba(40,50,35,${0.12 + rng() * 0.06})`);
        g.addColorStop(0.35, `rgba(40,50,35,${0.06 + rng() * 0.04})`);
        g.addColorStop(fade, 'rgba(40,50,35,0)');
        g.addColorStop(1, 'rgba(40,50,35,0)');
        ctx.fillStyle = g; ctx.fillRect(x - sw / 2, 0, sw, h);
    }
    // Green moss at bottom 25%
    const mg = ctx.createLinearGradient(0, h, 0, h * 0.75);
    mg.addColorStop(0, 'rgba(45,75,35,0.18)'); mg.addColorStop(1, 'rgba(45,75,35,0)');
    ctx.fillStyle = mg; ctx.fillRect(0, h * 0.75, w, h * 0.25);
    for (let i = 0; i < 100; i++) {
        const r = 2 + rng() * 5;
        ctx.fillStyle = `rgba(${40 + rng() * 30},${65 + rng() * 30},${30 + rng() * 20},${0.08 + rng() * 0.1})`;
        ctx.beginPath(); ctx.arc(rng() * w, h * 0.78 + rng() * h * 0.22, r, 0, Math.PI * 2); ctx.fill();
    }
    // Patchy plaster blobs — exposed concrete
    for (let i = 0; i < 5; i++) {
        ctx.fillStyle = `rgba(160,150,135,${0.1 + rng() * 0.05})`;
        ctx.beginPath(); ctx.arc(rng() * w, rng() * h, 12 + rng() * 22, 0, Math.PI * 2); ctx.fill();
    }
    // Horizontal crack lines
    for (let i = 0; i < 4; i++) {
        const y = 40 + rng() * (h - 80);
        ctx.strokeStyle = `rgba(100,90,80,${0.08 + rng() * 0.06})`;
        ctx.lineWidth = 0.4 + rng() * 0.5;
        ctx.beginPath();
        let cx = rng() * w * 0.2;
        ctx.moveTo(cx, y);
        for (let s = 0; s < 4; s++) { cx += 30 + rng() * 60; ctx.lineTo(cx, y + (rng() - 0.5) * 6); }
        ctx.stroke();
    }
    // Rust drip stains
    for (let i = 0; i < 2; i++) {
        const x = rng() * w, sw = 2 + rng() * 4;
        const g = ctx.createLinearGradient(x, rng() * h * 0.3, x, h * 0.6 + rng() * h * 0.4);
        g.addColorStop(0, `rgba(120,70,40,${0.05 + rng() * 0.03})`);
        g.addColorStop(1, 'rgba(120,70,40,0)');
        ctx.fillStyle = g; ctx.fillRect(x - sw / 2, 0, sw, h);
    }
});
TEX.wall.repeat.set(1, 1);

// Wall bump map — plaster relief
TEX.wallBump = makeTex(512, 512, (ctx, w, h) => {
    ctx.fillStyle = '#808080'; ctx.fillRect(0, 0, w, h);
    const rng = tRand(99);
    // Fine noise
    for (let i = 0; i < 6000; i++) {
        const v = 118 + rng() * 20;
        ctx.fillStyle = `rgb(${v},${v},${v})`;
        ctx.fillRect(rng() * w, rng() * h, 1 + rng() * 2, 1 + rng() * 2);
    }
    // Rough patches
    for (let i = 0; i < 10; i++) {
        const v = 100 + rng() * 40;
        ctx.fillStyle = `rgba(${v},${v},${v},0.15)`;
        ctx.beginPath();
        ctx.arc(rng() * w, rng() * h, 8 + rng() * 18, 0, Math.PI * 2);
        ctx.fill();
    }
    // Crack indentations
    for (let i = 0; i < 4; i++) {
        const y = 40 + rng() * (h - 80);
        ctx.strokeStyle = `rgb(${70 + rng() * 20},${70 + rng() * 20},${70 + rng() * 20})`;
        ctx.lineWidth = 0.8 + rng() * 0.4;
        ctx.beginPath();
        let cx = rng() * w * 0.2;
        ctx.moveTo(cx, y);
        for (let s = 0; s < 4; s++) { cx += 30 + rng() * 60; ctx.lineTo(cx, y + (rng() - 0.5) * 6); }
        ctx.stroke();
    }
});
TEX.wallBump.repeat.set(1, 1);

// Concrete texture — weathered
TEX.concrete = makeTex(256, 256, (ctx, w, h) => {
    ctx.fillStyle = '#9C9484'; ctx.fillRect(0, 0, w, h);
    const rng = tRand(77);
    // Grain noise
    for (let i = 0; i < 3000; i++) {
        const v = 140 + rng() * 35;
        ctx.fillStyle = `rgb(${v},${v - 4},${v - 8})`;
        ctx.fillRect(rng() * w, rng() * h, 1 + rng() * 4, 1 + rng() * 2);
    }
    // Dark blotchy patches
    for (let i = 0; i < 12; i++) {
        ctx.fillStyle = `rgba(50,48,42,${0.04 + rng() * 0.04})`;
        ctx.beginPath(); ctx.arc(rng() * w, rng() * h, 5 + rng() * 14, 0, Math.PI * 2); ctx.fill();
    }
    // Green-black lichen spots
    for (let i = 0; i < 5; i++) {
        ctx.fillStyle = `rgba(35,55,30,${0.04 + rng() * 0.03})`;
        ctx.beginPath(); ctx.arc(rng() * w, rng() * h, 3 + rng() * 8, 0, Math.PI * 2); ctx.fill();
    }
    // Hairline surface cracks
    for (let i = 0; i < 8; i++) {
        ctx.strokeStyle = `rgba(60,55,48,${0.05 + rng() * 0.05})`;
        ctx.lineWidth = 0.3 + rng() * 0.4;
        ctx.beginPath(); ctx.moveTo(rng() * w, rng() * h);
        ctx.lineTo(rng() * w, rng() * h); ctx.stroke();
    }
});
TEX.concrete.repeat.set(2, 2);

// Wood grain texture — aged tropical hardwood
TEX.wood = makeTex(256, 512, (ctx, w, h) => {
    ctx.fillStyle = '#4A2C14'; ctx.fillRect(0, 0, w, h);
    const rng = tRand(33);
    // Grain lines every 1.8px
    for (let y = 0; y < h; y += 1.8) {
        const v = 65 + rng() * 30;
        ctx.strokeStyle = `rgba(${v},${Math.floor(v * 0.5)},${Math.floor(v * 0.2)},${0.08 + rng() * 0.06})`;
        ctx.lineWidth = 0.5 + rng() * 1;
        ctx.beginPath(); ctx.moveTo(0, y + (rng() - 0.5) * 1.5);
        ctx.lineTo(w, y + (rng() - 0.5) * 3); ctx.stroke();
    }
    // Knots (2)
    for (let i = 0; i < 2; i++) {
        const kx = 30 + rng() * (w - 60), ky = 50 + rng() * (h - 100);
        const kr = 6 + rng() * 8;
        for (let r = kr; r > 0; r -= 1.5) {
            ctx.strokeStyle = `rgba(35,20,8,${0.08 + (kr - r) / kr * 0.18})`;
            ctx.lineWidth = 1; ctx.beginPath();
            ctx.ellipse(kx, ky, r, r * 0.7, rng() * 0.3, 0, Math.PI * 2); ctx.stroke();
        }
    }
    // Horizontal aging bands
    for (let i = 0; i < 5; i++) {
        const y = rng() * h, bh = 10 + rng() * 25;
        ctx.fillStyle = `rgba(25,18,8,${0.03 + rng() * 0.02})`;
        ctx.fillRect(0, y, w, bh);
    }
    // Subtle green mold patches
    for (let i = 0; i < 3; i++) {
        ctx.fillStyle = `rgba(40,60,30,${0.02 + rng() * 0.02})`;
        ctx.beginPath(); ctx.arc(rng() * w, rng() * h, 6 + rng() * 10, 0, Math.PI * 2); ctx.fill();
    }
});
TEX.wood.repeat.set(1, 2);

// Brick texture — laterite with light moss
TEX.brick = makeTex(256, 256, (ctx, w, h) => {
    const bw = 32, bh = 16, gap = 3;
    ctx.fillStyle = '#786858'; ctx.fillRect(0, 0, w, h);
    const rng = tRand(55);
    for (let row = 0; row < h / (bh + gap); row++) {
        const offset = (row % 2) * bw / 2;
        for (let col = -1; col < w / (bw + gap) + 1; col++) {
            const bx = col * (bw + gap) + offset, by = row * (bh + gap);
            const shade = rng();
            const r = shade > 0.5 ? 155 + rng() * 30 : 120 + rng() * 25;
            const g = 50 + rng() * 20, b = 30 + rng() * 15;
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(bx, by, bw, bh);
            for (let i = 0; i < 8; i++) {
                ctx.fillStyle = `rgba(${r + 15},${g + 8},${b + 5},0.2)`;
                ctx.fillRect(bx + rng() * bw, by + rng() * bh, rng() * 8, rng() * 4);
            }
        }
        // Light moss in mortar joints
        const jy = row * (bh + gap) + bh;
        for (let x = 0; x < w; x += 6 + rng() * 8) {
            ctx.fillStyle = `rgba(50,80,40,${0.05 + rng() * 0.05})`;
            ctx.fillRect(x, jy, 2 + rng() * 3, gap);
        }
    }
    // Bottom darkening gradient
    const dg = ctx.createLinearGradient(0, h, 0, h * 0.6);
    dg.addColorStop(0, 'rgba(40,50,35,0.08)'); dg.addColorStop(1, 'rgba(40,50,35,0)');
    ctx.fillStyle = dg; ctx.fillRect(0, h * 0.6, w, h * 0.4);
});
TEX.brick.repeat.set(2, 2);

// Red oxide floor — lightly worn platform
TEX.redOxide = makeTex(256, 256, (ctx, w, h) => {
    ctx.fillStyle = '#823024'; ctx.fillRect(0, 0, w, h);
    const rng = tRand(88);
    // Noise flecks
    for (let i = 0; i < 1500; i++) {
        const v = rng() > 0.5 ? 145 + rng() * 20 : 110 + rng() * 20;
        ctx.fillStyle = `rgba(${v},${Math.floor(v * 0.35)},${Math.floor(v * 0.22)},0.1)`;
        ctx.fillRect(rng() * w, rng() * h, 2 + rng() * 4, 1 + rng() * 3);
    }
    // Wear paths — lighter horizontal bands
    for (let i = 0; i < 2; i++) {
        const y = rng() * h, bh = 12 + rng() * 20;
        ctx.fillStyle = `rgba(160,80,55,${0.03 + rng() * 0.03})`;
        ctx.fillRect(0, y, w, bh);
    }
    // Dirt in edges — darker corners
    for (let i = 0; i < 2; i++) {
        const cx = i < 1 ? rng() * 40 : w - rng() * 40;
        const cy = i % 2 === 0 ? rng() * 40 : h - rng() * 40;
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 25 + rng() * 20);
        g.addColorStop(0, 'rgba(40,18,10,0.06)'); g.addColorStop(1, 'rgba(40,18,10,0)');
        ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
    }
});
TEX.redOxide.repeat.set(2, 2);

// Coconut bark (ring marks)
TEX.bark = makeTex(128, 512, (ctx, w, h) => {
    ctx.fillStyle = '#6B5D42'; ctx.fillRect(0, 0, w, h);
    const rng = tRand(22);
    // Horizontal ring marks
    for (let y = 0; y < h; y += 6 + rng() * 4) {
        ctx.strokeStyle = `rgba(50,42,28,${0.3 + rng() * 0.3})`;
        ctx.lineWidth = 1 + rng() * 2;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y + (rng() - 0.5) * 2); ctx.stroke();
        // Light edge below ring
        ctx.strokeStyle = `rgba(140,120,85,${0.15 + rng() * 0.15})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(0, y + 2); ctx.lineTo(w, y + 2); ctx.stroke();
    }
    // Vertical fiber texture
    for (let i = 0; i < 200; i++) {
        ctx.strokeStyle = `rgba(80,68,45,${0.1 + rng() * 0.15})`;
        ctx.lineWidth = 0.5;
        const x = rng() * w;
        ctx.beginPath(); ctx.moveTo(x, rng() * h); ctx.lineTo(x + (rng() - 0.5) * 3, rng() * h); ctx.stroke();
    }
});
TEX.bark.repeat.set(1, 2);

// Glass texture (subtle reflections)
TEX.glass = makeTex(64, 64, (ctx, w, h) => {
    ctx.fillStyle = '#7ABCD4'; ctx.fillRect(0, 0, w, h);
    const g = ctx.createLinearGradient(0, 0, w, h);
    g.addColorStop(0, 'rgba(200,230,255,0.15)'); g.addColorStop(0.5, 'rgba(200,230,255,0)');
    g.addColorStop(1, 'rgba(200,230,255,0.1)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
});

// Terrain grass/dirt texture
TEX.terrain = makeTex(512, 512, (ctx, w, h) => {
    // Base brown laterite earth
    ctx.fillStyle = '#7A5A3A'; ctx.fillRect(0, 0, w, h);
    const rng = tRand(111);
    // Earth texture strokes — dirt, clay, dried mud
    for (let i = 0; i < 6000; i++) {
        const x = rng() * w, y = rng() * h;
        const shade = rng();
        if (shade > 0.6) {
            // Light sandy patches
            const v = 140 + rng() * 50;
            ctx.fillStyle = `rgba(${v},${v * 0.72},${v * 0.45},${0.15 + rng() * 0.2})`;
        } else if (shade > 0.3) {
            // Red laterite flecks
            const r = 130 + rng() * 50;
            ctx.fillStyle = `rgba(${r},${r * 0.55},${r * 0.3},${0.12 + rng() * 0.18})`;
        } else {
            // Dark earth
            const v = 60 + rng() * 40;
            ctx.fillStyle = `rgba(${v},${v * 0.7},${v * 0.5},${0.15 + rng() * 0.2})`;
        }
        ctx.fillRect(x, y, 1 + rng() * 4, 1 + rng() * 3);
    }
    // Cracks and texture lines
    for (let i = 0; i < 40; i++) {
        const x = rng() * w, y = rng() * h;
        ctx.strokeStyle = `rgba(${50 + rng() * 30},${35 + rng() * 20},${20 + rng() * 15},${0.08 + rng() * 0.1})`;
        ctx.lineWidth = 0.3 + rng() * 0.8;
        ctx.beginPath(); ctx.moveTo(x, y);
        ctx.lineTo(x + (rng() - 0.5) * 20, y + (rng() - 0.5) * 8);
        ctx.stroke();
    }
    // Small pebbles/gravel
    for (let i = 0; i < 300; i++) {
        const v = 90 + rng() * 70;
        ctx.fillStyle = `rgba(${v},${v * 0.8},${v * 0.6},${0.15 + rng() * 0.2})`;
        ctx.beginPath();
        ctx.arc(rng() * w, rng() * h, 0.4 + rng() * 1.2, 0, Math.PI * 2);
        ctx.fill();
    }
});
TEX.terrain.repeat.set(12, 12);

// ============================================================
// SCENE
// ============================================================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x81908a, 20, 130); // misty Western Ghats
const clock = new THREE.Clock();

const windTargets = { coconuts: [], plantains: [] };

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.3, 600);
camera.position.set(0, 5, 15);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// ============================================================
// FIRST-PERSON CONTROLS
// ============================================================
const controls = new PointerLockControls(camera, document.body);
controls.minPolarAngle = Math.PI * 0.1;  // can't look straight up
controls.maxPolarAngle = Math.PI * 0.9;  // can't look straight down
const overlay = document.getElementById('overlay');
const hud = document.getElementById('hud');

overlay.addEventListener('click', () => controls.lock());
controls.addEventListener('lock', () => { overlay.style.display = 'none'; hud.style.display = 'block'; });
controls.addEventListener('unlock', () => { overlay.style.display = 'flex'; hud.style.display = 'none'; });

const moveState = { forward: false, backward: false, left: false, right: false, sprint: false, jump: false };
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();
const WALK_SPEED = 4, SPRINT_SPEED = 7, DECEL = 12;
const MAX_VELOCITY = 7;

// Walking feel
let stepCycle = 0;
let smoothY = 0;
let smoothYInit = false;
const HEAD_BOB_FREQ = 5;
const HEAD_BOB_AMP = 0.015;
const HEAD_BOB_AMP_SPRINT = 0.022;
const Y_SMOOTH_SPEED = 8;
const EYE_HEIGHT = 2.2;

// Jump
let verticalVelocity = 0;
let isOnGround = true;
const GRAVITY = 20;
const JUMP_FORCE = 7;

// Collision obstacles: array of { x, z, r } cylinders
const colliders = [];

function registerCollider(x, z, r) {
    colliders.push({ x, z, r: r + 0.3 });
}

function checkColliders(px, pz) {
    for (const c of colliders) {
        const dx = px - c.x, dz = pz - c.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist < c.r) {
            // Push out along the vector from center to player
            const nx = dx / dist, nz = dz / dist;
            return { x: c.x + nx * c.r, z: c.z + nz * c.r };
        }
    }
    return null;
}

document.addEventListener('keydown', e => {
    switch (e.code) {
        case 'KeyW': case 'ArrowUp':    moveState.forward = true; break;
        case 'KeyS': case 'ArrowDown':  moveState.backward = true; break;
        case 'KeyA': case 'ArrowLeft':  moveState.left = true; break;
        case 'KeyD': case 'ArrowRight': moveState.right = true; break;
        case 'ShiftLeft': case 'ShiftRight': moveState.sprint = true; break;
        case 'Space': moveState.jump = true; break;
    }
});
document.addEventListener('keyup', e => {
    switch (e.code) {
        case 'KeyW': case 'ArrowUp':    moveState.forward = false; break;
        case 'KeyS': case 'ArrowDown':  moveState.backward = false; break;
        case 'KeyA': case 'ArrowLeft':  moveState.left = false; break;
        case 'KeyD': case 'ArrowRight': moveState.right = false; break;
        case 'ShiftLeft': case 'ShiftRight': moveState.sprint = false; break;
        case 'Space': moveState.jump = false; break;
        case 'KeyV': if (glbScene) glbScene.visible = !glbScene.visible; break;
        case 'KeyF':
            scene.traverse(c => { if (c.isMesh && c.material) {
                (Array.isArray(c.material) ? c.material : [c.material]).forEach(m => m.wireframe = !m.wireframe);
            }});
            break;
    }
});

// House collision — updated dynamically when house model loads
let houseAABB = null; // set after house loads

// No retaining walls — natural terrain slopes
function checkRetainingWalls() { return null; }

function updateMovement(delta) {
    if (!controls.isLocked) return;
    const sprinting = moveState.sprint;
    const speed = sprinting ? SPRINT_SPEED : WALK_SPEED;

    direction.z = Number(moveState.forward) - Number(moveState.backward);
    direction.x = Number(moveState.right) - Number(moveState.left);
    const isMoving = direction.length() > 0;
    direction.normalize();

    // Acceleration / deceleration
    if (moveState.forward || moveState.backward) velocity.z -= direction.z * speed * delta;
    else velocity.z -= velocity.z * DECEL * delta;

    if (moveState.left || moveState.right) velocity.x -= direction.x * speed * delta;
    else velocity.x -= velocity.x * DECEL * delta;

    // Clamp velocity to prevent runaway speed
    const vMag = Math.sqrt(velocity.x * velocity.x + velocity.z * velocity.z);
    if (vMag > MAX_VELOCITY) {
        velocity.x *= MAX_VELOCITY / vMag;
        velocity.z *= MAX_VELOCITY / vMag;
    }

    const pos = camera.position;

    controls.moveRight(-velocity.x * delta);
    controls.moveForward(-velocity.z * delta);

    // House AABB collision (dynamically set when house loads)
    if (houseAABB) {
        const pad = 0.5; // player body radius
        const hb = houseAABB;
        if (pos.x > hb.minX - pad && pos.x < hb.maxX + pad &&
            pos.z > hb.minZ - pad && pos.z < hb.maxZ + pad) {
            const dists = [
                { axis: 'x', val: hb.minX - pad, d: Math.abs(pos.x - (hb.minX - pad)) },
                { axis: 'x', val: hb.maxX + pad, d: Math.abs(pos.x - (hb.maxX + pad)) },
                { axis: 'z', val: hb.minZ - pad, d: Math.abs(pos.z - (hb.minZ - pad)) },
                { axis: 'z', val: hb.maxZ + pad, d: Math.abs(pos.z - (hb.maxZ + pad)) },
            ];
            dists.sort((a, b) => a.d - b.d);
            pos[dists[0].axis] = dists[0].val;
            velocity.x *= 0.2; velocity.z *= 0.2;
        }
    }

    // Retaining wall collision
    const wallPush = checkRetainingWalls(pos.x, pos.z);
    if (wallPush) {
        pos.x = wallPush.x;
        pos.z = wallPush.z;
        velocity.x *= 0.2;
    }

    // Cylinder colliders (trees, well, rocks)
    const push = checkColliders(pos.x, pos.z);
    if (push) {
        pos.x = push.x;
        pos.z = push.z;
        velocity.x *= 0.2; velocity.z *= 0.2;
    }

    // World bounds
    pos.x = Math.max(-85, Math.min(85, pos.x));
    pos.z = Math.max(-85, Math.min(85, pos.z));

    // Ground height at current position
    const groundY = walkableHeight(pos.x, pos.z) + EYE_HEIGHT;
    if (!smoothYInit) { smoothY = groundY; smoothYInit = true; }
    // Prevent smooth Y from lagging too far behind (max 2m difference)
    if (Math.abs(smoothY - groundY) > 2) smoothY = groundY;

    // Jump physics
    if (moveState.jump && isOnGround) {
        verticalVelocity = JUMP_FORCE;
        isOnGround = false;
    }

    if (!isOnGround) {
        verticalVelocity -= GRAVITY * delta;
        smoothY += verticalVelocity * delta;
        if (smoothY <= groundY) {
            smoothY = groundY;
            verticalVelocity = 0;
            isOnGround = true;
        }
    } else {
        // Smooth terrain following when on ground
        smoothY += (groundY - smoothY) * Math.min(1, Y_SMOOTH_SPEED * delta);
    }

    // Head bob (only when on ground and moving)
    const moveSpeed = Math.sqrt(velocity.x * velocity.x + velocity.z * velocity.z);
    if (isOnGround && isMoving && moveSpeed > 0.3) {
        stepCycle += delta * HEAD_BOB_FREQ * (sprinting ? 1.2 : 1.0);
        const bobAmp = sprinting ? HEAD_BOB_AMP_SPRINT : HEAD_BOB_AMP;
        pos.y = smoothY + Math.sin(stepCycle * Math.PI * 2) * bobAmp;
    } else {
        if (stepCycle > 0) stepCycle *= 0.8;
        pos.y = smoothY;
    }
}

// ============================================================
// NOISE
// ============================================================
function hash2D(x, z) { let n = Math.sin(x * 127.1 + z * 311.7) * 43758.5453; return n - Math.floor(n); }
function smoothNoise(x, z) {
    const ix = Math.floor(x), iz = Math.floor(z), fx = x - ix, fz = z - iz;
    const ux = fx * fx * (3 - 2 * fx), uz = fz * fz * (3 - 2 * fz);
    const a = hash2D(ix, iz), b = hash2D(ix + 1, iz), c = hash2D(ix, iz + 1), d = hash2D(ix + 1, iz + 1);
    return a + (b - a) * ux + (c - a) * uz + (a - b - c + d) * ux * uz;
}
function fbm(x, z, oct = 4) {
    let v = 0, a = 1, f = 1, t = 0;
    for (let i = 0; i < oct; i++) { v += a * smoothNoise(x * f, z * f); t += a; a *= 0.5; f *= 2; }
    return v / t;
}

// ============================================================
// TERRAIN UTILITIES (inspired by reference implementation)
// ============================================================
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function smoothstep(e0, e1, x) { const t = clamp((x - e0) / (e1 - e0), 0, 1); return t * t * (3 - 2 * t); }
function lerp(a, b, t) { return a + (b - a) * t; }

// Clearing mask: radial falloff around house — creates natural flat clearing
function clearingMask(x, z) {
    const d = Math.hypot(x * 0.85, z + 2);
    return 1 - smoothstep(12, 32, d);
}

// Path mask: worn dirt trail from approach to house entrance
function pathMask(x, z) {
    // Simple path from front (z=25) to house (z=0)
    const dx = Math.abs(x);
    const onPath = dx < 2.5 && z > -5 && z < 25;
    return onPath ? smoothstep(2.5, 0.5, dx) * smoothstep(25, 20, z) : 0;
}

// Terrain slope at a point (for coloring and grass placement)
function terrainSlope(x, z) {
    const e = 0.3;
    const dx = getTerrainY(x + e, z) - getTerrainY(x - e, z);
    const dz = getTerrainY(x, z + e) - getTerrainY(x, z - e);
    return Math.min(1, Math.sqrt(dx * dx + dz * dz));
}

// ============================================================
// TERRAIN HEIGHT FUNCTION (smoothstep transitions)
// ============================================================
const HOUSE_FLOOR = 1.5;

// Shared terrace definitions — used by both terrain and walls
// [radius, stepHeight] — narrower steps, more of them
const RIGHT_TERRACES = [[12, 1.2], [17, 1.3], [22, 1.4], [27, 1.3], [32, 1.2], [37, 1.1]];
const LEFT_TERRACES  = [[12, 1.2], [17, 1.3], [22, 1.4], [27, 1.3], [32, 1.2], [37, 1.1]];
const TERRACE_Z_STRETCH = 3.5; // stronger elliptical curve

// Staircase height: flat between walls, near-vertical step at each wall
function staircaseHeight(dist, steps) {
    let h = 0;
    for (let i = 0; i < steps.length; i++) {
        const [r, dh] = steps[i];
        // Very steep: 0.4 unit transition (almost vertical)
        h += smoothstep(r - 0.2, r + 0.2, dist) * dh;
    }
    return h;
}

function getTerrainY(x, z) {
    // Very subtle organic noise (won't break flat terraces)
    const baseNoise =
        Math.sin(x * 0.09) * 0.15 +
        Math.cos(z * 0.12) * 0.1 +
        Math.sin((x + z) * 0.08) * 0.12;
    let y = HOUSE_FLOOR + baseNoise * 0.2;

    // House plateau — flat hilltop
    const housePlateau = clearingMask(x, z);
    y = lerp(y, HOUSE_FLOOR, housePlateau);

    // RIGHT SIDE (positive x): terraces going UP — sharp staircase
    const rightDist = Math.hypot(Math.max(0, x), z / TERRACE_Z_STRETCH);
    const rightMask = smoothstep(5, 12, x);
    y += staircaseHeight(rightDist, RIGHT_TERRACES) * rightMask;

    // LEFT SIDE (negative x): terraces going DOWN — sharp staircase
    const leftDist = Math.hypot(Math.max(0, -x), z / TERRACE_Z_STRETCH);
    const leftMask = smoothstep(5, 12, -x);
    y -= staircaseHeight(leftDist, LEFT_TERRACES) * leftMask;

    // Front approach — gentle ramp down
    const frontDist = Math.max(0, z - 5);
    y -= smoothstep(0, 30, frontDist) * 2.5;

    // Back side — gentle rise
    const backDist = Math.max(0, -z - 10);
    y += smoothstep(0, 30, backDist) * 1.5;

    // Fine fbm noise (very low amplitude to keep terraces flat)
    y += (fbm(x * 0.04, z * 0.04) - 0.5) * 0.6;
    y += (fbm(x * 0.1 + 50, z * 0.1 + 50) - 0.5) * 0.15;

    return y;
}

// Walkable height — includes house floor platform + sculpted terrain deltas
// _terrainDeltaFn is set after terrain loads (to avoid forward reference)
let _terrainDeltaFn = () => 0;
function walkableHeight(x, z) {
    let y = getTerrainY(x, z) + _terrainDeltaFn(x, z);
    const insideHouse = x > -10 && x < 10 && z > -20 && z < 5;
    if (insideHouse) {
        y = Math.max(y, HOUSE_FLOOR);
    }
    return y;
}

function isInStepZone() { return false; }

// ============================================================
// TERRAIN
// ============================================================
function createTerrain() {
    const group = new THREE.Group();
    const size = 180, seg = 160;
    const geo = new THREE.PlaneGeometry(size, size, seg, seg);
    geo.rotateX(-Math.PI / 2);
    const pos = geo.attributes.position;
    const colors = new Float32Array(pos.count * 3);
    // Colors — mostly brown/laterite earth with patches of green
    const dirtLight = { r: 0.52, g: 0.36, b: 0.22 };  // light brown laterite
    const dirtDark  = { r: 0.38, g: 0.25, b: 0.15 };  // dark earth
    const dirtRed   = { r: 0.50, g: 0.28, b: 0.16 };  // red laterite
    const greenPatch = { r: 0.30, g: 0.42, b: 0.18 };  // sparse green patches
    const wetDark   = { r: 0.25, g: 0.18, b: 0.12 };  // damp earth

    for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i), z = pos.getZ(i);
        const y = getTerrainY(x, z);
        pos.setY(i, y);

        const slope = terrainSlope(x, z);
        const clear = clearingMask(x, z);
        const path = pathMask(x, z);
        const n1 = hash2D(x * 0.3, z * 0.3);       // large patches
        const n2 = hash2D(x * 0.8 + 100, z * 0.8);  // fine detail
        const n3 = hash2D(x * 0.15, z * 0.15 + 50);  // green patch noise
        const noise = (n2 - 0.5) * 0.07;

        // Start with light brown dirt
        let r = dirtLight.r, g = dirtLight.g, b = dirtLight.b;

        // Red laterite patches
        const redAmount = smoothstep(0.3, 0.7, n1) * 0.5;
        r = lerp(r, dirtRed.r, redAmount);
        g = lerp(g, dirtRed.g, redAmount);
        b = lerp(b, dirtRed.b, redAmount);

        // Darker earth on slopes and paths
        const darkAmount = clamp(slope * 0.6 + path * 0.5 + clear * 0.3, 0, 1);
        r = lerp(r, dirtDark.r, darkAmount);
        g = lerp(g, dirtDark.g, darkAmount);
        b = lerp(b, dirtDark.b, darkAmount);

        // No green — pure brown/laterite terrain

        // Wet/damp patches
        const wetAmount = smoothstep(0.6, 0.9, n2) * 0.2;
        r = lerp(r, wetDark.r, wetAmount);
        g = lerp(g, wetDark.g, wetAmount);
        b = lerp(b, wetDark.b, wetAmount);

        // Fine noise variation
        r += noise; g += noise; b += noise;

        colors[i * 3] = clamp(r, 0, 1);
        colors[i * 3 + 1] = clamp(g, 0, 1);
        colors[i * 3 + 2] = clamp(b, 0, 1);
    }
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geo.computeVertexNormals();
    const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.92, map: TEX.terrain, bumpMap: TEX.terrain, bumpScale: 0.3 }));
    mesh.receiveShadow = true; mesh.castShadow = true;
    group.add(mesh);

    return group;
}

// ============================================================
// CURVED TERRACE WALLS — smooth continuous arc retaining walls
// ============================================================
function createTerraceWalls() {
    const g = new THREE.Group();
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x6B5A48, roughness: 0.95, side: THREE.DoubleSide });
    const mossMat = new THREE.MeshStandardMaterial({ color: 0x4A6B38, roughness: 0.9 });

    // Build a smooth curved wall as custom BufferGeometry
    // side: 1 = right (uphill outward), -1 = left (downhill outward)
    function addTerraceWall(radius, side, wallHeight, zStretch) {
        const segs = 64;
        const arcAngle = Math.PI * 1.1; // wider arc — more curved
        const startAngle = -arcAngle / 2;
        const thickness = 0.3; // thinner = steeper face

        // Sample terrain just inside (downhill) and just outside (uphill) the wall
        // to get the two terrace levels this wall connects
        const verts = [], normals = [], indices = [];
        for (let i = 0; i <= segs; i++) {
            const a = startAngle + (i / segs) * arcAngle;
            const cosA = Math.cos(a), sinA = Math.sin(a);
            const nx = cosA * side, nz = sinA;

            // Sample point on arc center
            const cx = side * cosA * radius;
            const cz = sinA * radius * zStretch;
            // Offset inward (toward house) to get lower terrace level
            const inX = side * cosA * (radius - 1.5);
            const inZ = sinA * (radius - 1.5) * zStretch;
            // Offset outward to get upper terrace level
            const outX = side * cosA * (radius + 1.5);
            const outZ = sinA * (radius + 1.5) * zStretch;

            const lowerY = getTerrainY(inX, inZ);  // downhill side
            const upperY = getTerrainY(outX, outZ); // uphill side

            for (let ring = 0; ring < 2; ring++) { // 0=inner(downhill), 1=outer(uphill)
                const r = radius + (ring - 0.5) * thickness;
                const px = side * cosA * r;
                const pz = sinA * r * zStretch;

                for (let row = 0; row < 2; row++) { // 0=bottom, 1=top
                    let py;
                    if (row === 0) {
                        // Bottom: sits at lower terrace level, slightly embedded
                        py = lowerY - 0.15;
                    } else {
                        // Top: matches the upper terrace level exactly
                        py = upperY;
                    }
                    verts.push(px, py, pz);
                    normals.push(ring === 1 ? nx : -nx, 0, ring === 1 ? nz : -nz);
                }
            }
        }

        // Indices: 4 verts per column: inner-bot(0), inner-top(1), outer-bot(2), outer-top(3)
        for (let i = 0; i < segs; i++) {
            const c0 = i * 4, c1 = (i + 1) * 4;
            // Outer face
            indices.push(c0 + 2, c1 + 2, c1 + 3, c0 + 2, c1 + 3, c0 + 3);
            // Inner face (reversed winding)
            indices.push(c0 + 0, c1 + 1, c1 + 0, c0 + 0, c0 + 1, c1 + 1);
            // Top face
            indices.push(c0 + 1, c0 + 3, c1 + 3, c0 + 1, c1 + 3, c1 + 1);
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
        geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
        geo.setIndex(indices);
        geo.computeVertexNormals();

        const wall = new THREE.Mesh(geo, wallMat);
        wall.castShadow = true; wall.receiveShadow = true;
        g.add(wall);

        // Moss line on top — thin curved strip at upper terrace level
        const mossVerts = [], mossIdx = [];
        for (let i = 0; i <= segs; i++) {
            const a = startAngle + (i / segs) * arcAngle;
            const cosA = Math.cos(a), sinA = Math.sin(a);
            const px = side * cosA * radius;
            const pz = sinA * radius * zStretch;
            const outX = side * cosA * (radius + 1.5);
            const outZ = sinA * (radius + 1.5) * zStretch;
            const topY = getTerrainY(outX, outZ) + 0.04;
            mossVerts.push(
                px - cosA * side * 0.3, topY, pz - sinA * 0.3,
                px + cosA * side * 0.3, topY + 0.06, pz + sinA * 0.3
            );
            if (i < segs) {
                const v = i * 2;
                mossIdx.push(v, v + 2, v + 3, v, v + 3, v + 1);
            }
        }
        const mossGeo = new THREE.BufferGeometry();
        mossGeo.setAttribute('position', new THREE.Float32BufferAttribute(mossVerts, 3));
        mossGeo.setIndex(mossIdx);
        mossGeo.computeVertexNormals();
        const moss = new THREE.Mesh(mossGeo, mossMat);
        moss.receiveShadow = true;
        g.add(moss);
    }

    // Generate walls from shared terrace definitions
    RIGHT_TERRACES.forEach(([r, h]) => addTerraceWall(r, 1, h, TERRACE_Z_STRETCH));
    LEFT_TERRACES.forEach(([r, h]) => addTerraceWall(r, -1, h, TERRACE_Z_STRETCH));

    return g;
}

// GRASS CLUSTERS + MOSS (curved blades, varying sizes, natural clusters)
// ============================================================
function createGrassSystem() {
    const group = new THREE.Group();

    // Seeded random
    let seed = 42;
    function rand() { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }

    // Grass blade shape — curved via bezier, not a cone
    function makeBladeGeo(h, w) {
        const shape = new THREE.Shape();
        shape.moveTo(-w / 2, 0);
        shape.quadraticCurveTo(-w * 0.3, h * 0.4, w * 0.15, h * 0.85);
        shape.quadraticCurveTo(w * 0.2, h, 0, h);
        shape.quadraticCurveTo(-w * 0.1, h * 0.9, -w * 0.05, h * 0.8);
        shape.quadraticCurveTo(w * 0.1, h * 0.35, w / 2, 0);
        shape.lineTo(-w / 2, 0);
        return new THREE.ShapeGeometry(shape, 1);
    }

    // Pre-create a few blade geometries at different sizes
    const bladeGeos = [
        makeBladeGeo(0.3, 0.04),
        makeBladeGeo(0.5, 0.05),
        makeBladeGeo(0.7, 0.06),
        makeBladeGeo(0.9, 0.06),
        makeBladeGeo(1.1, 0.07),
    ];

    // Grass greens — variety of shades
    const grassColors = [
        0x2D5A1E, 0x3A6B28, 0x4A7A32, 0x2A5518, 0x3E7030,
        0x486E28, 0x355E22, 0x528A38, 0x1E4A12, 0x407530,
    ];

    // Place grass clusters
    const clusterCount = 1400;
    for (let c = 0; c < clusterCount; c++) {
        const cx = rand() * 160 - 80;
        const cz = rand() * 160 - 80;
        const nearHouse = Math.hypot(cx, cz) < 8;
        const path = pathMask(cx, cz);
        if (nearHouse || path > 0.3) continue;

        // Thick clusters: some are sparse tufts, some are dense bushes
        const isThick = rand() > 0.6;
        const density = isThick ? (12 + Math.floor(rand() * 18)) : (3 + Math.floor(rand() * 8));
        const spread = isThick ? (0.5 + rand() * 1.0) : (0.3 + rand() * 0.6);
        const baseY = getTerrainY(cx, cz);

        for (let b = 0; b < density; b++) {
            const bx = cx + (rand() - 0.5) * spread * 2;
            const bz = cz + (rand() - 0.5) * spread * 2;
            // Snap each blade to terrain at its own position
            const by = getTerrainY(bx, bz) - 0.02; // sink slightly into ground

            const geoIdx = Math.floor(rand() * bladeGeos.length);
            const colorIdx = Math.floor(rand() * grassColors.length);
            const mat = new THREE.MeshStandardMaterial({
                color: grassColors[colorIdx], roughness: 0.85, side: THREE.DoubleSide
            });
            const blade = new THREE.Mesh(bladeGeos[geoIdx], mat);
            blade.position.set(bx, by, bz);
            blade.rotation.y = rand() * Math.PI * 2;
            blade.rotation.z = (rand() - 0.5) * 0.3;
            blade.rotation.x = (rand() - 0.5) * 0.15;
            group.add(blade);
        }

    }

    return group;
}

// GROUND COVER (with wind-animatable grass)

function createGroundCover() {
    const g = new THREE.Group();
    const mats = [
        new THREE.MeshLambertMaterial({ color: C.grass, side: THREE.DoubleSide }),
        new THREE.MeshLambertMaterial({ color: C.grassLight, side: THREE.DoubleSide }),
        new THREE.MeshLambertMaterial({ color: C.grassDry, side: THREE.DoubleSide }),
    ];
    const grassBlades = [];
    for (let i = 0; i < 300; i++) {
        const x = (Math.random() - 0.5) * 140;
        const z = (Math.random() - 0.5) * 100;
        const y = getTerrainY(x, z);
        const mat = mats[Math.floor(Math.random() * 3)];
        for (let j = 0; j < 3; j++) {
            const h = 0.25 + Math.random() * 0.5;
            const blade = new THREE.Shape();
            blade.moveTo(-0.025, 0);
            blade.quadraticCurveTo(0.04, h * 0.6, (Math.random() - 0.5) * 0.12, h);
            blade.quadraticCurveTo(-0.04, h * 0.6, 0.025, 0);
            const m = new THREE.Mesh(new THREE.ShapeGeometry(blade), mat);
            m.position.set(x + (Math.random() - 0.5) * 0.5, y, z + (Math.random() - 0.5) * 0.5);
            m.rotation.y = Math.random() * Math.PI;
            m.userData.windPhase = Math.random() * Math.PI * 2;
            m.userData.worldX = x;
            grassBlades.push(m);
            g.add(m);
        }
    }
    g.userData.grassBlades = grassBlades;

    // Stones
    const stMat = new THREE.MeshLambertMaterial({ color: 0x7A7268 });
    for (let i = 0; i < 50; i++) {
        const x = (Math.random() - 0.5) * 100, z = (Math.random() - 0.5) * 60;
        const y = getTerrainY(x, z);
        const s = new THREE.Mesh(new THREE.SphereGeometry(0.12 + Math.random() * 0.18, 5, 4), stMat);
        s.position.set(x, y + 0.06, z); s.scale.y = 0.4 + Math.random() * 0.3;
        g.add(s);
    }
    return g;
}

const TERRAIN_SIZE = 180, TERRAIN_SEG = 160;
const CELL_SIZE = TERRAIN_SIZE / TERRAIN_SEG; // 1.125
const deltaGrid = new Float32Array((TERRAIN_SEG + 1) * (TERRAIN_SEG + 1)); // all zeros

try {
    const raw = localStorage.getItem('terrainDeltas');
    if (raw) {
        const tDeltas = JSON.parse(raw);
        const n = Object.keys(tDeltas).length;
        if (n > 0) {
            const tMesh = terrainGroup.children[0];
            const tPos = tMesh.geometry.attributes.position;
            console.log('Terrain mesh verts:', tPos.count, 'Deltas:', n);
            for (const [idx, dy] of Object.entries(tDeltas)) {
                const i = parseInt(idx);
                if (i < tPos.count) {
                    tPos.setY(i, tPos.getY(i) + dy);
                    deltaGrid[i] = dy; // store in grid for height sampling
                }
            }
            tPos.needsUpdate = true;
            tMesh.geometry.computeVertexNormals();
            console.log('Applied terrain edits:', n, 'vertices');
        }
    }
} catch (e) { console.log('Terrain delta error:', e); }

// Sample sculpted terrain delta at any world XZ via bilinear interpolation
function getTerrainDelta(x, z) {
    // Convert world coords to grid coords
    // PlaneGeometry vertices go from -size/2 to +size/2, row-major
    const gx = (x + TERRAIN_SIZE / 2) / CELL_SIZE;
    const gz = (z + TERRAIN_SIZE / 2) / CELL_SIZE;
    const ix = Math.floor(gx), iz = Math.floor(gz);
    if (ix < 0 || ix >= TERRAIN_SEG || iz < 0 || iz >= TERRAIN_SEG) return 0;
    const fx = gx - ix, fz = gz - iz;
    const stride = TERRAIN_SEG + 1;
    // PlaneGeometry: rows go along X, columns along Z (after rotateX(-PI/2))
    // Vertex index = iz * stride + ix  (but need to verify ordering)
    const i00 = iz * stride + ix;
    const i10 = iz * stride + ix + 1;
    const i01 = (iz + 1) * stride + ix;
    const i11 = (iz + 1) * stride + ix + 1;
    // Bilinear interpolation
    const d00 = deltaGrid[i00] || 0, d10 = deltaGrid[i10] || 0;
    const d01 = deltaGrid[i01] || 0, d11 = deltaGrid[i11] || 0;
    return (d00 * (1-fx) * (1-fz)) + (d10 * fx * (1-fz)) + (d01 * (1-fx) * fz) + (d11 * fx * fz);
}

// Connect terrain delta sampler to walkable height
_terrainDeltaFn = getTerrainDelta;

        obj.scale.set(0.18, 0.14, 0.35);
        obj.traverse(c => {
            if (c.isMesh) {
                c.castShadow = true; c.receiveShadow = true;
                const mats = Array.isArray(c.material) ? c.material : [c.material];
                c.material = mats.map(m => {
                    if (m.isMeshPhongMaterial) {
                        return new THREE.MeshStandardMaterial({
                            color: m.color, map: m.map, normalMap: m.normalMap, bumpMap: m.bumpMap,
                            side: THREE.DoubleSide, roughness: 0.9, metalness: 0.0,
                        });
                    }
                    return m;
                });
                if (c.material.length === 1) c.material = c.material[0];
            }
        });
        // Snap to terrain, right side of house front yard
        obj.updateMatrixWorld(true);
        const box = new THREE.Box3().setFromObject(obj);
        const rx = 14, rz = 18;
        const terrainY = getTerrainY(rx, rz);

        regObj('rock', obj);
        registerCollider(rx, rz, 4);
        console.log('Rock loaded');
    }, undefined, (err) => console.log('Rock OBJ failed:', err.message || err));
}, undefined, (err) => console.log('Rock MTL failed:', err.message || err));

const coconutData = [

    [25, -6], [-12, 18], [30, 4], [-32, 2], [36, -8],

    [-5, -18], [3, -20], [-14, -6], [16, -4], [-20, 10],
    [28, -12], [-25, -22], [35, 10], [-30, 8], [20, -20],
    [-10, -30], [8, -32], [-18, 14], [32, -18], [-35, -8],

function spawnCoconuts() {
    const tpl = coconutTemplates[0] || coconutTemplates[1];
    if (!tpl) return;
    coconutData.forEach(([x, z], i) => {
        const clone = (coconutTemplates[i % 2] || tpl).clone();
        const s = coconutHeights[i] / 1565;
        clone.scale.set(s, s, s);
        clone.userData.windPhase = coconutPhases[i];
        clone.rotation.y = Math.random() * Math.PI * 2;
        placeOnTerrain(clone, x, z, 0);
        scene.add(clone);
        regObj(`coconut_${i}`, clone);
        windTargets.coconuts.push(clone);
    });
}

// LOAD MANGO TREES OBJ+MTL (3 variants for dense canopy)
// ============================================================
const mangoMtlLoader = new MTLLoader();
mangoMtlLoader.setPath('assets/mango_tree/');
mangoMtlLoader.load('mango.mtl', (materials) => {
    materials.preload();
    const variants = ['tree_mango_var01.obj', 'tree_mango_var02.obj', 'tree_mango_var03.obj'];
    let loaded = 0;
    const templates = [null, null, null];

    // Placement data: [x, z, scaleVar, rotY]
    const mangoPlacements = [
        // Behind house — dense forest backdrop
        [-5, -20, 1.0, 0.5], [5, -22, 1.1, 2.0], [-10, -25, 0.9, 3.5],
        [8, -28, 1.0, 1.2], [-3, -30, 1.2, 4.0], [12, -24, 0.95, 0.8],
        [-15, -22, 1.0, 2.5], [0, -35, 1.1, 1.8],
        // Left hillside
        [-18, -5, 0.85, 1.0], [-22, 2, 1.0, 3.2], [-25, -10, 1.1, 0.3],
        [-20, 8, 0.9, 4.5], [-28, -3, 1.0, 2.0],
        // Right hillside
        [20, -8, 1.0, 1.4], [24, -3, 1.1, 3.8], [28, -10, 1.0, 0.6],
        [22, 5, 0.85, 2.8], [30, -6, 1.0, 1.5],
        // Scattered around
        [-8, 8, 0.8, 2.2], [6, 6, 0.9, 0.9], [-12, -15, 1.0, 3.0],
        [15, -14, 1.1, 4.2], [-6, -28, 1.0, 1.6],
    ];

    function spawnMangos() {
        const available = templates.filter(t => t !== null);
        if (available.length === 0) return;
        mangoPlacements.forEach(([x, z, scaleVar, rotY], i) => {
            const tpl = available[i % available.length];
            const clone = tpl.clone();
            // Re-assign materials from original
            const origMats = [];
            tpl.traverse(c => { if (c.isMesh) origMats.push(c.material); });
            let mi = 0;
            clone.traverse(c => {
                if (c.isMesh) {
                    c.material = origMats[mi++ % origMats.length];
                    c.castShadow = true; c.receiveShadow = true;
                }
            });
            // Models are ~270-320 units tall. Scale to ~10-14m
            const s = 0.045 * scaleVar;
            clone.scale.set(s, s, s);
            clone.rotation.y = rotY;
            const ty = getTerrainY(x, z);
            clone.position.set(x, ty, z);
            scene.add(clone);
            regObj(`mango_${i}`, clone);
            registerCollider(x, z, 0.6);
        });
        console.log('Mango trees placed:', mangoPlacements.length);
    }

    variants.forEach((file, idx) => {
        const loader = new OBJLoader();
        loader.setMaterials(materials);
        loader.setPath('assets/mango_tree/uploads_files_780879_MangoTreePack_OBJ/');
        loader.load(file, (obj) => {
            // Convert Phong → Standard
            obj.traverse(c => {
                if (c.isMesh) {
                    c.castShadow = true; c.receiveShadow = true;
                    const mats = Array.isArray(c.material) ? c.material : [c.material];
                    c.material = mats.map(m => {
                        if (m.isMeshPhongMaterial) {
                            return new THREE.MeshStandardMaterial({
                                color: m.color, map: m.map, normalMap: m.normalMap, bumpMap: m.bumpMap,
                                alphaMap: m.alphaMap, alphaTest: m.alphaMap ? 0.5 : 0,
                                side: THREE.DoubleSide, roughness: 0.75, metalness: 0.0,
                                transparent: !!m.alphaMap,
                            });
                        }
                        m.side = THREE.DoubleSide;
                        return m;
                    });
                    if (c.material.length === 1) c.material = c.material[0];
                }
            });
            templates[idx] = obj;
            loaded++;
            if (loaded >= 1) spawnMangos(); // spawn as soon as first variant loads
        }, undefined, (err) => {
            console.log('Mango', file, 'failed:', err.message || err);
            loaded++;
        });
    });
}, undefined, (err) => console.log('Mango MTL failed:', err.message || err));

// DUST MOTES (atmospheric particles)
// ============================================================
const dustGeo = new THREE.BufferGeometry();
const dustCount = 80;
const dustPositions = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
    dustPositions[i * 3] = (Math.random() - 0.5) * 40;
    dustPositions[i * 3 + 1] = 2 + Math.random() * 12;
    dustPositions[i * 3 + 2] = (Math.random() - 0.5) * 40;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
const dustMat = new THREE.PointsMaterial({ color: 0xFFEED0, size: 0.08, transparent: true, opacity: 0.4 });
const dustMotes = new THREE.Points(dustGeo, dustMat);
scene.add(dustMotes);

// ============================================================
// WIND ANIMATION
// ============================================================
function updateWind(elapsed) {
    const baseWind = Math.sin(elapsed * 0.5) * 0.5 + 0.5;

    windTargets.coconuts.forEach(t => {
        const phase = t.userData.windPhase || 0;
        const amp = 0.015 + baseWind * 0.01;
        t.rotation.x = Math.sin(elapsed * 1.2 + phase) * amp;
        t.rotation.z = Math.cos(elapsed * 1.2 + phase * 0.7) * amp * 0.6;
    });

    windTargets.plantains.forEach(t => {
        const phase = t.userData.windPhase || 0;
        const amp = 0.012;
        t.rotation.x = Math.sin(elapsed * 1.1 + phase) * amp;
        t.rotation.z = Math.cos(elapsed * 1.1 + phase * 0.8) * amp * 0.7;
    });
}

// ============================================================
// DUST MOTE ANIMATION
// ============================================================
function updateDust(elapsed) {
    const pos = dustMotes.geometry.attributes.position;
    for (let i = 0; i < dustCount; i++) {
        let x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
        x += Math.sin(elapsed * 0.3 + i * 0.5) * 0.003;
        y += Math.sin(elapsed * 0.2 + i * 0.3) * 0.002;
        z += Math.cos(elapsed * 0.25 + i * 0.4) * 0.003;
        // Wrap bounds
        if (x > 20) x = -20; if (x < -20) x = 20;
        if (y > 14) y = 2; if (y < 2) y = 14;
        if (z > 20) z = -20; if (z < -20) z = 20;
        pos.setXYZ(i, x, y, z);
    }
    pos.needsUpdate = true;
}

// ============================================================
// RENDER LOOP
// ============================================================
function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();
    updateMovement(delta);
    updateWind(elapsed);

    updateDust(elapsed);
    renderer.render(scene, camera);
}
animate();

// Set initial camera height
camera.position.y = walkableHeight(camera.position.x, camera.position.z) + EYE_HEIGHT;

addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
